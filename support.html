<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support - meet bell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --background: #fcc169;
      --foreground: #2d2420;
      --accent: #de746a;
      --muted: #9a7a4a;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --background: #1a1410;
        --foreground: #e8ddd0;
        --accent: #d48494;
        --muted: #8a7a68;
      }
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 640px;
      width: 100%;
      padding: 60px 24px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-style: italic;
      font-size: 2rem;
      color: var(--accent);
      margin-bottom: 32px;
    }
    p {
      font-size: 0.95rem;
      line-height: 1.8;
      opacity: 0.85;
      margin-bottom: 16px;
    }
    a { color: var(--accent); }
    .email {
      display: inline-block;
      font-size: 1.1rem;
      margin: 24px 0;
    }
    .back {
      display: inline-block;
      margin-top: 40px;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Support</h1>
    <p>Having trouble with meet bell? We're here to help.</p>
    <p>Email us and we'll get back to you as soon as we can:</p>
    <a href="mailto:support@meetbell.app" class="email">support@meetbell.app</a>

    <br><br>
    <a href="/" class="back">&larr; Back to meetbell.app</a>
  </div>
</body>
</html>
